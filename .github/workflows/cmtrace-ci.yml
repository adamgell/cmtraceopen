name: "CMTrace Open: CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          # Cargo.lock moved to the workspace root when src-tauri became a
          # member of the cmtraceopen Cargo workspace; cache key follows.
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust check (lite)
        working-directory: src-tauri
        run: cargo check --no-default-features

      - name: Rust tests (lite)
        working-directory: src-tauri
        run: cargo test --no-default-features

      - name: Rust clippy (lite)
        working-directory: src-tauri
        run: cargo clippy --no-default-features --all-targets -- -D warnings

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Install cargo-deny and cargo-audit
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny,cargo-audit

      - name: Supply chain audit (licenses & bans)
        working-directory: src-tauri
        run: cargo deny check

      - name: Security vulnerability audit
        # cargo-audit reads Cargo.lock from the current directory (no
        # workspace walk); run from the repo root where the lockfile now
        # lives. Covers the full workspace: src-tauri + cmtraceopen-parser.
        run: cargo audit

  msrv:
    name: Rust MSRV (1.77.2 / ${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust 1.77.2
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.77.2"

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-msrv-1.77.2-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-msrv-1.77.2-

      - name: Rust MSRV check
        run: cargo +1.77.2 check --workspace --all-features --locked

  frontend:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm run test

      - name: CI bundle output contract tests
        run: node --test scripts/ci-bundle-outputs.test.mjs scripts/ci-windows-provenance.test.mjs

      - name: npm security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  windows-esp:
    name: ESP Diagnostics (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-esp-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-esp-cargo-

      - name: Test ESP parser contracts
        run: cargo test --locked -p cmtraceopen-parser --test esp_diagnostics

      - name: Test native ESP diagnostics
        run: cargo test --locked -p cmtrace-open --all-features --test esp_diagnostics_sources

      - name: Test Graph ESP diagnostics
        run: cargo test --locked -p cmtrace-open --all-features --test graph_esp_diagnostics

      - name: Test full Windows application workspace
        run: cargo test --locked -p cmtrace-open --all-features

      - name: Clippy Windows ESP paths
        run: cargo clippy --locked -p cmtrace-open --all-targets --all-features -- -D warnings
  build:
    name: Build (${{ matrix.label }})
    needs: [check, frontend, windows-esp]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Remove cached bundle outputs
        env:
          BUNDLE_ROOT: src-tauri/target/${{ matrix.target }}/release/bundle
        run: node scripts/ci-bundle-outputs.mjs clean

      - name: Install frontend dependencies
        run: npm ci

      - name: Disable updater signing for CI builds
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (c.bundle) c.bundle.createUpdaterArtifacts = false;
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --target ${{ matrix.target }}

      - name: Verify current-version bundle outputs
        env:
          BUNDLE_ROOT: src-tauri/target/${{ matrix.target }}/release/bundle
        run: node scripts/ci-bundle-outputs.mjs verify

      - name: Record Windows build provenance
        if: runner.os == 'Windows'
        env:
          RELEASE_ROOT: src-tauri/target/${{ matrix.target }}/release
          TARGET_TRIPLE: ${{ matrix.target }}
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/ci-windows-provenance.mjs

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cmtrace-open-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/provenance/windows-build-provenance.json
          if-no-files-found: warn
